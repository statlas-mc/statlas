<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c0a06"/>
      <stop offset="0.55" stop-color="#0d0503"/>
      <stop offset="1" stop-color="#080302"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.16" r="0.9">
      <stop offset="0" stop-color="#ff6a1f" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#ff6a1f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ember" x1="0" y1="80" x2="0" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffab6b"/>
      <stop offset="0.45" stop-color="#ff8a3d"/>
      <stop offset="0.75" stop-color="#ff6a1f"/>
      <stop offset="1" stop-color="#c5350a"/>
    </linearGradient>
  </defs>

  <!-- app-icon rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#glow)"/>
  <rect x="1.5" y="1.5" width="509" height="509" rx="114.5" fill="none" stroke="#ff8a3d" stroke-opacity="0.14" stroke-width="3"/>

  <!-- blocky ascending bars (stats) -->
  <g fill="url(#ember)">
    <!-- bar 1 (x=79) — 2 blocks -->
    <rect x="79" y="352" width="66" height="58" rx="9"/>
    <rect x="79" y="286" width="66" height="58" rx="9"/>
    <!-- bar 2 (x=175) — 3 blocks -->
    <rect x="175" y="352" width="66" height="58" rx="9"/>
    <rect x="175" y="286" width="66" height="58" rx="9"/>
    <rect x="175" y="220" width="66" height="58" rx="9"/>
    <!-- bar 3 (x=271) — 4 blocks -->
    <rect x="271" y="352" width="66" height="58" rx="9"/>
    <rect x="271" y="286" width="66" height="58" rx="9"/>
    <rect x="271" y="220" width="66" height="58" rx="9"/>
    <rect x="271" y="154" width="66" height="58" rx="9"/>
    <!-- bar 4 (x=367) — 5 blocks -->
    <rect x="367" y="352" width="66" height="58" rx="9"/>
    <rect x="367" y="286" width="66" height="58" rx="9"/>
    <rect x="367" y="220" width="66" height="58" rx="9"/>
    <rect x="367" y="154" width="66" height="58" rx="9"/>
  </g>

  <!-- gold "crown" block tops the tallest bar -->
  <rect x="367" y="88" width="66" height="58" rx="9" fill="#ffc95a"/>
</svg>
