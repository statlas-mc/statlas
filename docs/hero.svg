<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#150705"/>
      <stop offset="0.55" stop-color="#0b0402"/>
      <stop offset="1" stop-color="#070302"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffab6b"/>
      <stop offset="0.42" stop-color="#ff8a3d"/>
      <stop offset="0.68" stop-color="#ff6a1f"/>
      <stop offset="1" stop-color="#c5350a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="-0.1" r="0.9">
      <stop offset="0" stop-color="#ff6a1f" stop-opacity="0.28"/>
      <stop offset="0.6" stop-color="#ff6a1f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="0.1" r="0.8">
      <stop offset="0" stop-color="#e11d0f" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#e11d0f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#glow)"/>
  <rect width="1200" height="360" fill="url(#glow2)"/>
  <!-- pixel motif -->
  <g fill="#ff8a3d" opacity="0.10">
    <rect x="60" y="250" width="26" height="26"/><rect x="92" y="250" width="26" height="26"/><rect x="60" y="282" width="26" height="26"/>
    <rect x="1060" y="70" width="26" height="26"/><rect x="1092" y="70" width="26" height="26"/><rect x="1092" y="102" width="26" height="26"/>
    <rect x="1120" y="250" width="26" height="26"/><rect x="1120" y="282" width="26" height="26"/>
  </g>
  <text x="600" y="150" text-anchor="middle" font-size="104" font-weight="800" fill="url(#heat)" letter-spacing="-2">Statlas</text>
  <text x="600" y="205" text-anchor="middle" font-size="27" font-weight="600" fill="#f6efe9" letter-spacing="0.5">A season-in-review site for your Minecraft server</text>
  <text x="600" y="248" text-anchor="middle" font-size="18" font-weight="500" fill="#ff8a3d" letter-spacing="3" opacity="0.9">BUILT FROM VANILLA STATS · NO PLUGIN · FREE</text>
  <g transform="translate(600,300)">
